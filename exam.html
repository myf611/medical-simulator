<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Симулятор пациента</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f7f6f2; --surface: #fff; --surface2: #f2f1ed;
    --border: #e2e0d8; --border2: #ccc9be;
    --text: #1a1917; --text2: #6b6960; --text3: #9e9b90;
    --accent: #1a5276; --accent-light: #eaf1f8;
    --green: #0f6e56; --green-light: #e1f5ee;
    --amber: #854f0b; --amber-light: #faeeda;
    --red: #a32d2d; --red-light: #fcebeb;
    --font: 'Inter', system-ui, sans-serif;
  }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100%; }
  button, input, textarea { font-family: var(--font); }

  /* ── SHARED ── */
  .screen { display: none; min-height: 100vh; max-height: 100vh; max-height: 100dvh; overflow-y: auto; }
  .screen.active { display: flex; flex-direction: column; }
  .primary-btn { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 13px 20px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font); display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s; }
  .primary-btn:hover { background: #15407a; }
  .primary-btn:disabled { opacity: .5; cursor: not-allowed; }
  .green-btn { background: var(--green); }
  .green-btn:hover { background: #0a5240; }
  .ghost-btn { background: none; border: 1px solid var(--border2); color: var(--text2); border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); }

  /* ── INSTRUCTION SCREEN ── */
  #screen-instruction { align-items: center; justify-content: center; padding: 24px; }
  .instr-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; max-width: 640px; width: 100%; padding: 32px 30px; box-shadow: 0 10px 40px rgba(0,0,0,.06); }
  .instr-logo { font-size: 32px; text-align: center; margin-bottom: 8px; }
  .instr-title { font-size: 22px; font-weight: 700; text-align: center; color: var(--text); margin-bottom: 4px; }
  .instr-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 24px; }
  .instr-section { margin-bottom: 22px; }
  .instr-section h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); margin-bottom: 10px; }
  .instr-purpose { font-size: 14px; line-height: 1.6; color: var(--text2); background: var(--surface2); border-radius: 12px; padding: 14px 16px; }
  .timing-row { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--border); }
  .timing-row:last-child { border-bottom: none; }
  .timing-icon { width: 30px; height: 30px; border-radius: 9px; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .timing-name { flex: 1; font-size: 13.5px; font-weight: 600; color: var(--text); }
  .timing-desc { font-size: 11.5px; color: var(--text3); margin-top: 1px; }
  .timing-min { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .timing-total { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 12px; border-top: 2px solid var(--border); font-size: 13px; font-weight: 700; color: var(--text); }
  .instr-rules { display: flex; flex-direction: column; gap: 8px; }
  .instr-rule { display: flex; gap: 8px; font-size: 12.5px; color: var(--text2); line-height: 1.5; }
  .instr-rule b { color: var(--red); flex-shrink: 0; }
  .instr-start-btn { width: 100%; margin-top: 8px; padding: 14px; font-size: 15px; }

  /* ── EXAM SCREEN ── */
  #screen-exam { height: 100vh; height: 100dvh; overflow: hidden; }
  .exam-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 50px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .exam-header .logo { font-size: 13px; font-weight: 700; color: var(--accent); }
  .exam-header .student-name { font-size: 12px; color: var(--text2); }

  /* PROGRESS BAR */
  .progress-bar { display: flex; gap: 6px; padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
  .progress-step { flex: 1; min-width: 90px; display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 10px; font-size: 11.5px; font-weight: 600; white-space: nowrap; cursor: default; transition: all .15s; }
  .progress-step .p-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
  .progress-step.done { background: var(--green-light); color: var(--green); }
  .progress-step.done .p-icon { background: var(--green); color: #fff; }
  .progress-step.active { background: var(--accent); color: #fff; }
  .progress-step.active .p-icon { background: rgba(255,255,255,.25); color: #fff; }
  .progress-step.locked { background: var(--surface2); color: var(--text3); }
  .progress-step.locked .p-icon { background: var(--border2); color: var(--text3); }

  /* COLUMN LAYOUT */
  .columns-wrap { flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; align-items: stretch; min-height: 0; scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch; }
  .exam-col { flex: 0 0 min(340px, 92vw); max-width: 340px; height: 100%; border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; scroll-snap-align: start; background: var(--surface); }
  .exam-col:last-child { border-right: none; }
  .exam-col.locked { background: var(--surface2); }
  .exam-col.active { box-shadow: inset 0 0 0 2px var(--accent); }
  .col-content { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  @media (min-width: 1400px) { .exam-col { flex: 1 1 0; max-width: none; } }

  .col-timer-bar { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .col-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .col-timer-val { font-size: 16px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .col-timer-val.warning { color: var(--amber); }
  .col-timer-val.danger { color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .col-timer-static { font-size: 12px; color: var(--text3); }

  .col-locked-msg { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 20px; text-align: center; color: var(--text3); font-size: 12px; }
  .col-locked-msg .lock-ic { font-size: 24px; }

  .col-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .col-footer { padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }

  /* CHAT (reused for anamnesis + exam blocks) */
  .msg { display: flex; gap: 8px; }
  .msg.student { align-self: flex-end; flex-direction: row-reverse; max-width: 90%; }
  .msg.patient { align-self: flex-start; max-width: 90%; }
  .msg.system { align-self: center; max-width: 100%; }
  .msg.result { align-self: flex-start; max-width: 100%; width: 100%; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .avatar.p { background: var(--amber-light); color: var(--amber); border: 1px solid #fac775; }
  .avatar.s { background: var(--accent-light); color: var(--accent); border: 1px solid #b5d4f4; }
  .bubble { padding: 8px 12px; border-radius: 13px; font-size: 13px; line-height: 1.55; }
  .msg.patient .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.student .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.system .bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 11px; text-align: center; padding: 6px 12px; width: 100%; }

  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; width: 100%; }
  .result-card-title { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
  .result-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px; }
  .result-row:last-child { border-bottom: none; }
  .result-key { color: var(--text2); }
  .result-val { font-weight: 600; text-align: right; }
  .result-val.ab { color: var(--red); }
  .result-val.wa { color: var(--amber); }
  .result-val.ok { color: var(--green); }
  .result-ref { font-size: 9px; color: var(--text3); }

  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
  .typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .chat-input-row { display: flex; gap: 6px; align-items: flex-end; }
  .chat-input { flex: 1; resize: none; border: 1px solid var(--border2); border-radius: 18px; padding: 9px 14px; font-size: 13px; color: var(--text); background: var(--surface2); outline: none; line-height: 1.4; max-height: 90px; min-height: 38px; -webkit-appearance: none; }
  .chat-input:focus { border-color: var(--accent); background: var(--surface); }
  .chat-send { height: 38px; width: 38px; background: var(--accent); color: #fff; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .chat-send:disabled { background: var(--text3); cursor: not-allowed; }

  .next-btn { width: 100%; padding: 10px; font-size: 13px; }

  /* PRELIM DIAGNOSIS / FINAL TEXTAREAS */
  .col-textarea-wrap { display: flex; flex-direction: column; gap: 6px; }
  .col-textarea-wrap label { font-size: 12px; font-weight: 600; color: var(--text2); }
  .col-textarea { width: 100%; min-height: 100px; border: 1px solid var(--border2); border-radius: 10px; padding: 10px 12px; font-size: 13px; color: var(--text); background: var(--surface2); outline: none; resize: vertical; line-height: 1.5; }
  .col-textarea:focus { border-color: var(--accent); background: var(--surface); }

  /* LAB GROUPS */
  .lab-group-static { margin-bottom: 4px; }
  .lab-group-static-title { padding: 10px 4px 6px; font-size: 11.5px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .03em; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .lab-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .lab-item:hover { background: var(--surface2); }
  .lab-item input { accent-color: var(--accent); width: 14px; height: 14px; flex-shrink: 0; }
  .lab-item.used { color: var(--text3); text-decoration: line-through; pointer-events: none; }
  .lab-submit-btn { width: 100%; padding: 10px; font-size: 13px; margin-top: 4px; }

  /* RESULTS SCREEN */
  #screen-results { align-items: center; padding: 24px 16px; overflow-y: auto; }
  .results-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; max-width: 720px; width: 100%; padding: 30px 28px; margin: auto; }
  .results-grade { text-align: center; margin-bottom: 24px; }
  .results-grade .num { font-size: 44px; font-weight: 800; color: var(--accent); line-height: 1; }
  .results-grade .lbl { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .block-grades-row { display: flex; gap: 8px; margin-bottom: 26px; flex-wrap: wrap; justify-content: center; }
  .block-grade-chip { flex: 1; min-width: 90px; text-align: center; background: var(--surface2); border-radius: 10px; padding: 8px 6px; }
  .block-grade-chip .bg-num { font-size: 16px; font-weight: 700; color: var(--accent); }
  .block-grade-chip .bg-lbl { font-size: 9.5px; color: var(--text3); margin-top: 2px; }
  .points-section { margin-bottom: 20px; }
  .points-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .points-title.good { color: var(--green); }
  .points-title.bad { color: var(--red); }
  .points-list { display: flex; flex-direction: column; gap: 8px; }
  .point-item { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; padding: 10px 12px; border-radius: 10px; }
  .point-item.good { background: var(--green-light); color: #0a4a3a; }
  .point-item.bad { background: var(--red-light); color: #7a2424; }
  .results-btns { display: flex; gap: 10px; margin-top: 24px; }
  .results-btns .primary-btn { flex: 1; }

  /* TIME UP OVERLAY */
  .timeup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 300; padding: 20px; }
  .timeup-overlay.show { display: flex; }

  /* CATALOG MODAL (shared: exam + labs) */
  .catalog-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: flex-end; justify-content: center; z-index: 250; touch-action: none; overscroll-behavior: none; }
  .catalog-modal-overlay.show { display: flex; }
  @media (min-width: 700px) { .catalog-modal-overlay { align-items: center; padding: 20px; } }
  .catalog-modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; display: block; position: relative; }
  @media (min-width: 700px) { .catalog-modal { border-radius: 18px; } }
  .catalog-modal-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .catalog-modal-head h3 { font-size: 15px; font-weight: 700; }
  .catalog-modal-close { background: none; border: none; font-size: 20px; color: var(--text3); cursor: pointer; line-height: 1; }
  .catalog-modal-body { overflow-y: scroll; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
  .catalog-modal-footer { padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .timeup-card { background: var(--surface); border-radius: 20px; padding: 26px; max-width: 340px; text-align: center; }
  .timeup-card .ic { font-size: 30px; margin-bottom: 10px; }

  @media (max-width: 640px) {
    .instr-card { padding: 24px 18px; }
  }

  /* ── MOBILE: different interaction model — one active block full-width, others hidden. Tap "done" step in progress bar to view. ── */
  @media (max-width: 899px) {
    .columns-wrap { overflow-x: hidden; }
    .exam-col { display: none; border-right: none; }
    .exam-col.active { display: flex; flex-direction: column; flex: 1 1 100%; max-width: 100%; height: 100%; min-height: 0; }
    .progress-step { min-width: 0; flex: 0 0 auto; padding: 8px; }
    .progress-step:not(.active) .p-label { display: none; }
    .progress-step.active { flex: 1 1 auto; }
    .progress-step.done { cursor: pointer; }
    .progress-bar { justify-content: center; }
  }
  @media (min-width: 900px) {
    .progress-step { cursor: default; }
  }

  /* Reused from cabinet review screen styling */
  .rv-detail-block { border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .rv-detail-block h4 { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .rv-empty { font-size: 12px; color: var(--text3); font-style: italic; }
  .rv-chat-line { font-size: 12.5px; line-height: 1.6; margin-bottom: 4px; }
  .rv-chat-line b { color: var(--accent); }

  /* FLOATING FEEDBACK BUTTON */
  .fb-float-btn { position: fixed; bottom: 20px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 22px; box-shadow: 0 8px 24px rgba(26,82,118,.3); cursor: pointer; z-index: 400; display: none; align-items: center; justify-content: center; }
  .fb-float-btn.show { display: flex; }
  .fb-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: flex-end; justify-content: center; z-index: 401; }
  .fb-modal-overlay.show { display: flex; }
  @media (min-width: 600px) { .fb-modal-overlay { align-items: center; padding: 20px; } }
  .fb-modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 420px; padding: 22px 20px; }
  @media (min-width: 600px) { .fb-modal { border-radius: 18px; } }
  .fb-modal h3 { font-size: 16px; color: var(--text); margin-bottom: 4px; }
  .fb-modal p { font-size: 12.5px; color: var(--text3); margin-bottom: 14px; }
  .fb-modal textarea { width: 100%; min-height: 100px; border: 1px solid var(--border2); border-radius: 12px; padding: 12px 14px; font-size: 13.5px; outline: none; resize: vertical; font-family: inherit; margin-bottom: 12px; }
  .fb-modal-btns { display: flex; gap: 10px; }
  .fb-modal-btns button { flex: 1; }
  .fb-cancel-btn { background: none; border: 1px solid var(--border2); border-radius: 12px; height: 46px; color: var(--text3); font-weight: 700; font-size: 14px; }
  .fb-sent-msg { text-align: center; color: var(--green); font-size: 13px; font-weight: 700; padding: 8px 0; display: none; }


  .lang-switch-instr { display: flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
  .lang-mini-btn { background: transparent; border: none; padding: 5px 11px; font-weight: 800; font-size: 11px; color: var(--text3); cursor: pointer; }
  .lang-mini-btn.active { background: var(--accent-light); color: var(--accent); }

</style>
</head>
<body>

<!-- ═══════════════ SCREEN 1: INSTRUCTION ═══════════════ -->
<div class="screen active" id="screen-instruction">
  <div class="instr-card">
    <div style="display:flex; justify-content:flex-end; margin-bottom:-8px;">
      <div class="lang-switch-instr">
        <button class="lang-mini-btn" id="ilang-ru" onclick="switchExamLang('ru')">RU</button>
        <button class="lang-mini-btn" id="ilang-en" onclick="switchExamLang('en')">EN</button>
      </div>
    </div>
    <div class="instr-logo">🏥</div>
    <div class="instr-title" id="instr-title-text"></div>
    <div class="instr-sub" id="instr-student-name"></div>

    <div class="instr-section">
      <h3 id="instr-purpose-h"></h3>
      <div class="instr-purpose" id="instr-purpose-text"></div>
    </div>

    <div class="instr-section">
      <h3 id="instr-timing-h"></h3>
      <div id="instr-timing-rows"></div>
      <div class="timing-total"><span id="instr-total-label"></span><span id="instr-total-value"></span></div>
    </div>

    <div class="instr-section">
      <h3 id="instr-rules-h"></h3>
      <div class="instr-rules" id="instr-rules-list"></div>
    </div>

    <button class="primary-btn green-btn instr-start-btn" id="instr-start-btn" onclick="startExam()"></button>
  </div>
</div>

<!-- ═══════════════ SCREEN 2: EXAM (5 columns) ═══════════════ -->
<div class="screen" id="screen-exam">
  <div class="exam-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:16px;">🏥</span>
      <span class="logo" id="exam-header-logo"></span>
    </div>
    <div class="student-name" id="exam-student-name">—</div>
  </div>

  <div class="progress-bar" id="progress-bar"></div>

  <div class="columns-wrap" id="columns-wrap"></div>
</div>

<!-- ═══════════════ SCREEN 3: RESULTS ═══════════════ -->
<div class="screen" id="screen-results">
  <div class="results-card">
    <div class="results-grade">
      <div class="num" id="res-grade">—</div>
      <div class="lbl" id="res-grade-lbl"></div>
    </div>

    <div class="block-grades-row" id="res-block-grades"></div>

    <div class="points-section">
      <div class="points-title good" id="res-positive-title"></div>
      <div class="points-list" id="res-positive"></div>
    </div>

    <div class="points-section">
      <div class="points-title bad" id="res-negative-title"></div>
      <div class="points-list" id="res-negative"></div>
    </div>

    <div class="results-btns">
      <button class="primary-btn" id="res-back-btn" onclick="backToCabinet()"></button>
    </div>
  </div>
</div>

<!-- TIME UP for whole case (safety net) -->
<div class="timeup-overlay" id="timeup-overlay">
  <div class="timeup-card">
    <div class="ic">⏱</div>
    <div style="font-weight:700;margin-bottom:6px;" id="timeup-title-text"></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;" id="timeup-desc-text"></div>
    <div class="typing-dots" style="justify-content:center;"><span></span><span></span><span></span></div>
  </div>
</div>

<script>
const BACKEND_URL = 'https://medical-simulator-api.onrender.com';

// Language: read from index.html's choice; UZ has no exam content yet, falls back to RU
let currentLang = (() => {
  const saved = localStorage.getItem('preferred_lang');
  return saved === 'en' ? 'en' : 'ru';
})();

// ── CASE DATA (RU/EN) ──────────────────────────────────
const CASE_DATA = {
ru: {

  const params = new URLSearchParams(window.location.search);

// ── SCREEN NAV ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startExam() {
  showScreen('screen-exam');
  renderProgressBar();
  renderColumns();
  activateBlock(0);
}

// ── PROGRESS BAR ──────────────────────────────────────
function renderProgressBar() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = BLOCKS.map((b, i) => {
    const state = i < currentBlockIdx ? 'done' : i === currentBlockIdx ? 'active' : 'locked';
    const icon = state === 'done' ? '✓' : state === 'locked' ? '🔒' : (i + 1);
    const click = state === 'done' ? ` onclick="viewBlockModal('${b.id}')"` : '';
    return `<div class="progress-step ${state}" id="pstep-${b.id}"${click}><span class="p-icon">${icon}</span><span class="p-label">${b.title}</span></div>`;
  }).join('');
}

function updateProgressBar() {
  BLOCKS.forEach((b, i) => {
    const el = document.getElementById(`pstep-${b.id}`);
    if (!el) return;
    const state = i < currentBlockIdx ? 'done' : i === currentBlockIdx ? 'active' : 'locked';
    el.className = `progress-step ${state}`;
    el.querySelector('.p-icon').textContent = state === 'done' ? '✓' : state === 'locked' ? '🔒' : (i + 1);
    el.onclick = state === 'done' ? () => viewBlockModal(b.id) : null;
  });
}

// ── VIEW COMPLETED BLOCK (mobile: tap done step in progress bar) ──
function viewBlockModal(blockId) {
  const block = BLOCKS.find(b => b.id === blockId);
  const data = blockData[blockId];
  let bodyHtml = '';

  if (blockId === 'anamnesis') {
    bodyHtml = (data.transcript || []).length
      ? data.transcript.map(m => `<div class="rv-chat-line"><b>${m.role === 'student' ? L.chat_you : L.chat_patient}:</b> ${m.text}</div>`).join('')
      : `<div class="rv-empty">${L.rv_empty}</div>`;
  } else if (blockId === 'exam' || blockId === 'labs') {
    bodyHtml = (data.ordered || []).length
      ? data.ordered.map(i => `<div class="rv-chat-line">• ${i}</div>`).join('')
      : `<div class="rv-empty">${L.rv_none_ordered}</div>`;
  } else if (blockId === 'preliminary_diagnosis') {
    bodyHtml = data.text ? `<div class="rv-chat-line">${data.text}</div>` : `<div class="rv-empty">${L.rv_not_specified}</div>`;
  } else if (blockId === 'final') {
    bodyHtml = `<div class="rv-chat-line"><b>${L.rv_diagnosis_label}</b> ${data.diagnosis || `(${L.rv_not_specified})`}</div><div class="rv-chat-line"><b>${L.rv_treatment_label}</b> ${data.treatment_plan || `(${L.rv_not_specified})`}</div>`;
  }

  document.getElementById('modal-title').textContent = `${block.icon} ${block.title} ${L.modal_view_suffix}`;
  document.getElementById('modal-body').innerHTML = `<div class="rv-detail-block" style="border:none;padding:0;">${bodyHtml}</div>`;
  document.getElementById('catalog-modal').classList.add('show');
  document.querySelector('.catalog-modal-footer').style.display = 'none';
  document.body.style.overflow = 'hidden';
  sizeCatalogModal();
}

// ── COLUMNS ───────────────────────────────────────────
function renderColumns() {
  const wrap = document.getElementById('columns-wrap');
  wrap.innerHTML = BLOCKS.map((b, i) => `
    <div class="exam-col" id="col-${b.id}" data-idx="${i}">
      <div class="col-timer-bar">
        <span class="col-title">${b.icon} ${b.title}</span>
        <span id="coltimer-${b.id}"></span>
      </div>
      <div id="colcontent-${b.id}" class="col-content"></div>
    </div>
  `).join('');
}

function fmtTime(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2, '0')}`;
}

function activateBlock(idx) {
  currentBlockIdx = idx;
  updateProgressBar();

  BLOCKS.forEach((b, i) => {
    const col = document.getElementById(`col-${b.id}`);
    col.classList.remove('active', 'locked');
    if (i === idx) col.classList.add('active');
    else if (i > idx) col.classList.add('locked');
  });

  const block = BLOCKS[idx];
  renderColTimer(block.id, blockTimers[block.id], true);
  renderBlockContent(block.id);

  clearInterval(activeInterval);
  activeInterval = setInterval(() => tickBlockTimer(block.id), 1000);

  // Scroll active column into view
  document.getElementById(`col-${block.id}`).scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });

  // Render locked (future) placeholders
  BLOCKS.forEach((b, i) => {
    if (i > idx) renderLockedPlaceholder(b.id);
  });
}

function renderColTimer(blockId, seconds, active) {
  const el = document.getElementById(`coltimer-${blockId}`);
  if (!active) { el.innerHTML = `<span class="col-timer-static">${fmtTime(seconds)}</span>`; return; }
  let cls = 'col-timer-val';
  if (seconds <= 30) cls += ' danger';
  else if (seconds <= 60) cls += ' warning';
  el.innerHTML = `<span class="${cls}">${fmtTime(seconds)}</span>`;
}

function tickBlockTimer(blockId) {
  blockTimers[blockId]--;
  if (blockTimers[blockId] < 0) blockTimers[blockId] = 0;
  renderColTimer(blockId, blockTimers[blockId], true);
  if (blockTimers[blockId] <= 0) {
    clearInterval(activeInterval);
    advanceBlock(true);
  }
}

function advanceBlock(byTimeout) {
  const block = BLOCKS[currentBlockIdx];
  const spent = block.duration - blockTimers[block.id];
  blockData[block.id].duration_seconds = spent;
  renderColTimer(block.id, spent, false);
  freezeBlockContent(block.id);

  if (currentBlockIdx >= BLOCKS.length - 1) {
    finishAllBlocks();
    return;
  }
  activateBlock(currentBlockIdx + 1);
}

function freezeBlockContent(blockId) {
  const content = document.getElementById(`colcontent-${blockId}`);
  content.querySelectorAll('input, textarea, button').forEach(el => el.disabled = true);
}

function renderLockedPlaceholder(blockId) {
  const content = document.getElementById(`colcontent-${blockId}`);
  const b = BLOCKS.find(x => x.id === blockId);
  content.innerHTML = `<div class="col-locked-msg"><span class="lock-ic">🔒</span>${L.locked_will_open} «${BLOCKS[BLOCKS.findIndex(x=>x.id===blockId)-1]?.title || '—'}»<br><span class="col-timer-static">${fmtTime(b.duration)}</span></div>`;
}

// ── BLOCK CONTENT RENDERERS ───────────────────────────
function renderBlockContent(blockId) {
  const content = document.getElementById(`colcontent-${blockId}`);
  if (blockId === 'anamnesis') renderChatBlock(blockId, content);
  else if (blockId === 'exam') renderGroupBlock('exam', content, EXAM_GROUPS);
  else if (blockId === 'preliminary_diagnosis') renderPrelimBlock(content);
  else if (blockId === 'labs') renderGroupBlock('labs', content, LAB_GROUPS);
  else if (blockId === 'final') renderFinalBlock(content);
}

// -- CHAT (anamnesis only) --
function renderChatBlock(blockId, content) {
  content.innerHTML = `
    <div class="col-body" id="chatbody-${blockId}"></div>
    <div class="col-footer">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatinput-${blockId}" rows="1" placeholder="${L.chat_anamnesis_placeholder}"></textarea>
        <button class="chat-send" id="chatsend-${blockId}" onclick="sendChatMsg('${blockId}')">➤</button>
      </div>
      <button class="primary-btn next-btn" style="margin-top:8px;" onclick="advanceBlock(false)">${L.next_btn}</button>
    </div>
  `;
  const initialMsg = L.patient_greeting(CASE.patient.name.split(' ')[0], CASE.patient.age);
  if (conversationHistory.length === 0) {
    addChatMessage(blockId, 'patient', initialMsg);
    conversationHistory.push({ role: 'assistant', content: initialMsg });
  }
  const input = document.getElementById(`chatinput-${blockId}`);
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(blockId); } });
  input.focus();
}

function addChatMessage(blockId, role, text) {
  const body = document.getElementById(`chatbody-${blockId}`);
  const d = document.createElement('div');
  d.className = `msg ${role === 'student' ? 'student' : role === 'patient' ? 'patient' : 'system'}`;
  if (role === 'patient') {
    d.innerHTML = `<div class="avatar p">${L.avatar_patient}</div><div class="bubble">${text}</div>`;
  } else if (role === 'student') {
    d.innerHTML = `<div class="avatar s">${L.chat_you}</div><div class="bubble">${text}</div>`;
  } else {
    d.innerHTML = `<div class="bubble">${text}</div>`;
  }
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  blockData[blockId].transcript.push({ role, text });
}

function showTypingIn(blockId) {
  const body = document.getElementById(`chatbody-${blockId}`);
  const d = document.createElement('div');
  d.className = 'msg patient'; d.id = `typing-${blockId}`;
  d.innerHTML = `<div class="avatar p">${L.avatar_patient}</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}
function hideTypingIn(blockId) { document.getElementById(`typing-${blockId}`)?.remove(); }

async function sendChatMsg(blockId) {
  if (isLoading) return;
  const input = document.getElementById(`chatinput-${blockId}`);
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  addChatMessage(blockId, 'student', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  showTypingIn(blockId);
  try {
    const res = await fetch(`${BACKEND_URL}/api/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...conversationHistory],
        temperature: 0.8
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || L.error_no_response;
    hideTypingIn(blockId);
    addChatMessage(blockId, 'patient', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTypingIn(blockId);
    addChatMessage(blockId, 'system', L.error_connection);
  }
  isLoading = false;
}

// ── EXAM FINDING TEXT LOOKUP ──────────────────────────
function getExamFinding(key) {
  if (key === 'витальные') return { rows: CASE.vitals };
  const dataMap = { общий: 'general', кардио: 'cardio', дыхание: 'resp', живот: 'abdomen', неврология: 'neuro', конечности: 'extremities' };
  if (dataMap[key]) return { rows: [{ k: L.finding_label, v: CASE.exam[dataMap[key]] }] };
  return null;
}

// ── GROUP BLOCK (used by both Осмотр и Анализы) ───────
function renderGroupBlock(blockId, content, groups) {
  const btnLabel = blockId === 'exam' ? L.assign_exam_btn : L.assign_labs_btn;
  content.innerHTML = `
    <div class="col-body" id="groupresults-${blockId}">
      <div style="font-size:12px;color:var(--text3);text-align:center;padding:16px 8px;" id="groupempty-${blockId}">${L.nothing_assigned}</div>
    </div>
    <div class="col-footer">
      <button class="primary-btn green-btn" style="width:100%;margin-bottom:8px;" onclick="openCatalogModal('${blockId}')">${btnLabel}</button>
      <button class="primary-btn next-btn" onclick="advanceBlock(false)">${L.next_btn}</button>
    </div>
  `;
}

let modalBlockId = null;
let modalUsedKeys = { exam: new Set(), labs: new Set() };

function openCatalogModal(blockId) {
  modalBlockId = blockId;
  const groups = blockId === 'exam' ? EXAM_GROUPS : LAB_GROUPS;
  const title = blockId === 'exam' ? L.assign_exam_title : L.assign_labs_title;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = groups.map((g, gi) => `
    <div class="lab-group-static">
      <div class="lab-group-static-title">${g.title}</div>
      ${g.items.map((it, ii) => {
        const usedKey = it.key || `${g.title}::${it.label}`;
        const used = modalUsedKeys[blockId].has(usedKey);
        return `<label class="lab-item ${used ? 'used' : ''}">
          <input type="checkbox" value="${usedKey}" data-label="${it.label.replace(/"/g,'&quot;')}" data-realkey="${it.key || ''}" class="modal-checkbox" ${used ? 'disabled checked' : ''}>
          ${it.label} ${used ? '✓' : ''}
        </label>`;
      }).join('')}
    </div>
  `).join('');
  document.getElementById('catalog-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
  sizeCatalogModal();
}

function sizeCatalogModal() {
  requestAnimationFrame(() => {
    const overlay = document.getElementById('catalog-modal');
    const modalEl = overlay.querySelector('.catalog-modal');
    const head = overlay.querySelector('.catalog-modal-head');
    const body = document.getElementById('modal-body');
    const footer = overlay.querySelector('.catalog-modal-footer');

    const vh = window.innerHeight;
    const maxModalHeight = Math.round(vh * 0.82);
    const headH = head.offsetHeight;
    const footerH = footer.style.display === 'none' ? 0 : footer.offsetHeight;
    const bodyH = maxModalHeight - headH - footerH;

    modalEl.style.maxHeight = maxModalHeight + 'px';
    body.style.height = bodyH + 'px';
    body.style.maxHeight = bodyH + 'px';
  });
}

function closeCatalogModal() {
  const overlay = document.getElementById('catalog-modal');
  overlay.classList.remove('show');
  document.querySelector('.catalog-modal-footer').style.display = 'block';
  document.body.style.overflow = '';
  const modalEl = overlay.querySelector('.catalog-modal');
  const body = document.getElementById('modal-body');
  modalEl.style.maxHeight = '';
  body.style.height = '';
  body.style.maxHeight = '';
  modalBlockId = null;
}

function confirmCatalogModal() {
  const checked = [...document.querySelectorAll('.modal-checkbox:checked:not(:disabled)')];
  if (checked.length === 0) { closeCatalogModal(); return; }
  const blockId = modalBlockId;
  const resultsWrap = document.getElementById(`groupresults-${blockId}`);
  document.getElementById(`groupempty-${blockId}`)?.remove();

  checked.forEach(cb => {
    const usedKey = cb.value;
    const realKey = cb.getAttribute('data-realkey');
    const label = cb.getAttribute('data-label');
    modalUsedKeys[blockId].add(usedKey);

    const d = document.createElement('div');
    d.className = 'result-card';
    d.style.marginBottom = '8px';

    if (blockId === 'labs') {
      blockData.labs.ordered.push(label);
      const labInfo = realKey ? CASE.labs[realKey] : null;
      if (labInfo) {
        const rowsHtml = labInfo.rows.map(r => `<div class="result-row"><span class="result-key">${r.k}</span><div style="text-align:right"><div class="result-val ${r.s || ''}">${r.v}</div><div class="result-ref">${r.r}</div></div></div>`).join('');
        d.innerHTML = `<div class="result-card-title">${labInfo.name}</div>${rowsHtml}`;
      } else {
        d.innerHTML = `<div class="result-card-title">${label}</div><div class="result-row"><span class="result-key">${L.result_label}</span><span class="result-val ok">${L.no_pathology}</span></div>`;
      }
    } else {
      blockData.exam.ordered.push(label);
      const finding = realKey ? getExamFinding(realKey) : null;
      if (finding) {
        const rowsHtml = finding.rows.map(r => `<div class="result-row"><span class="result-key">${r.k}</span><div style="text-align:right"><div class="result-val ${r.s || ''}">${r.v}</div>${r.r ? `<div class="result-ref">${r.r}</div>` : ''}</div></div>`).join('');
        d.innerHTML = `<div class="result-card-title">${label}</div>${rowsHtml}`;
      } else {
        d.innerHTML = `<div class="result-card-title">${label}</div><div class="result-row"><span class="result-key">${L.result_label}</span><span class="result-val ok">${L.no_findings}</span></div>`;
      }
    }
    resultsWrap.appendChild(d);
  });
  closeCatalogModal();
}

// -- PRELIMINARY DIAGNOSIS --
function renderPrelimBlock(content) {
  content.innerHTML = `
    <div class="col-body">
      <div class="col-textarea-wrap">
        <label>${L.prelim_label}</label>
        <textarea class="col-textarea" id="prelim-text" placeholder="${L.prelim_placeholder}"></textarea>
      </div>

}
function submitPrelim() {
  blockData.preliminary_diagnosis.text = document.getElementById('prelim-text').value.trim();

}

// -- LABS (grouped) --
// -- FINAL --
function renderFinalBlock(content) {
  content.innerHTML = `
    <div class="col-body">
      <div class="col-textarea-wrap">
        <label>${L.final_diagnosis_label}</label>
        <textarea class="col-textarea" id="final-diagnosis" style="min-height:70px;" placeholder="${L.final_diagnosis_placeholder}"></textarea>
      </div>
      <div class="col-textarea-wrap">

      </div>

function submitFinal() {
  blockData.final.diagnosis = document.getElementById('final-diagnosis').value.trim();
  blockData.final.treatment_plan = document.getElementById('final-treatment').value.trim();

  btn.disabled = true; btn.textContent = L.evaluating;
  advanceBlock(false);
}

// ── FINISH: call backend, show results ────────────────
async function finishAllBlocks() {
  clearInterval(activeInterval);
  document.getElementById('timeup-overlay').classList.add('show');

  const student = getStudentFromUrl();
  const totalDuration = BLOCKS.reduce((sum, b) => sum + (blockData[b.id].duration_seconds || 0), 0);

  try {
    const res = await fetch(`${BACKEND_URL}/api/finish-attempt`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        student_id: student.student_id,
        case_title: L.case_title,
        case_context: CASE_CONTEXT,
        blocks: blockData,
        duration_seconds: totalDuration,
        lang: currentLang
      })
    });
    const data = await res.json();
    document.getElementById('timeup-overlay').classList.remove('show');
    showResults(data.evaluation);
  } catch (e) {
    document.getElementById('timeup-overlay').classList.remove('show');
    showResults({ overall_grade: null, positive_points: [], negative_points: [L.eval_failed], block_grades: {} });
  }
}

function showResults(ev) {
  document.getElementById('res-grade').textContent = (ev.overall_grade !== null && ev.overall_grade !== undefined) ? ev.overall_grade + '%' : '—';

  const blockLabels = L.block_labels;
  const bg = ev.block_grades || {};
  document.getElementById('res-block-grades').innerHTML = Object.keys(blockLabels).map(k => `
    <div class="block-grade-chip"><div class="bg-num">${bg[k] !== undefined ? bg[k] + '%' : '—'}</div><div class="bg-lbl">${blockLabels[k]}</div></div>
  `).join('');

  document.getElementById('res-positive').innerHTML = (ev.positive_points || []).length
    ? ev.positive_points.map(p => `<div class="point-item good">✅ ${p}</div>`).join('')
    : `<div class="point-item good">${L.no_positive}</div>`;

  document.getElementById('res-negative').innerHTML = (ev.negative_points || []).length
    ? ev.negative_points.map(p => `<div class="point-item bad">⚠️ ${p}</div>`).join('')
    : `<div class="point-item bad">${L.no_negative}</div>`;

  showScreen('screen-results');
}

function backToCabinet() {
  const student = getStudentFromUrl();
  window.location.href = `index.html?student_id=${student.student_id}&name=${encodeURIComponent(student.name)}&phone=${encodeURIComponent(student.phone||'')}&autologin=1`;
}

// ── FEEDBACK (restricted to whitelisted phones) ──────
const FEEDBACK_PHONES = ['+998900060611', '+998909111752', '+998933814560'];

function checkFeedbackAccess(phone) {
  const btn = document.getElementById('fb-float-btn');
  if (phone && FEEDBACK_PHONES.includes(phone)) btn.classList.add('show');
  else btn.classList.remove('show');
}

function currentPageLabel() {
  if (document.getElementById('screen-instruction').classList.contains('active')) return L.page_instruction;
  if (document.getElementById('screen-results').classList.contains('active')) return L.page_results;
  const block = BLOCKS[currentBlockIdx];
  return block ? `${L.page_case_prefix} ${block.title}` : 'exam.html';
}

function openFeedbackModal() {
  document.getElementById('fb-text').value = '';
  document.getElementById('fb-sent-msg').style.display = 'none';
  document.getElementById('fb-text').style.display = 'block';
  document.querySelector('.fb-modal-btns').style.display = 'flex';
  document.getElementById('fb-modal-overlay').classList.add('show');
}
function closeFeedbackModal() {
  document.getElementById('fb-modal-overlay').classList.remove('show');
}
async function submitFeedback() {
  const message = document.getElementById('fb-text').value.trim();
  if (!message) return;
  const student = getStudentFromUrl();
  const btn = document.getElementById('fb-submit-btn');
  btn.disabled = true; btn.textContent = L.fb_sending;
  try {
    await fetch(`${BACKEND_URL}/api/feedback`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: student.student_id, phone: student.phone, message, page: currentPageLabel() })
    });
    document.getElementById('fb-text').style.display = 'none';
    document.querySelector('.fb-modal-btns').style.display = 'none';
    document.getElementById('fb-sent-msg').style.display = 'block';
    setTimeout(closeFeedbackModal, 1200);
  } catch (e) {
    alert(L.fb_failed);
  }
  btn.disabled = false; btn.textContent = L.fb_send_btn;
}

function switchExamLang(lang) {
  localStorage.setItem('preferred_lang', lang);
  location.reload();
}

function translateInstructionScreen() {
  document.getElementById('ilang-ru').classList.toggle('active', currentLang === 'ru');
  document.getElementById('ilang-en').classList.toggle('active', currentLang === 'en');

  document.getElementById('instr-title-text').textContent = L.instr_title;
  document.getElementById('instr-purpose-h').textContent = L.instr_purpose_h;
  document.getElementById('instr-purpose-text').textContent = L.instr_purpose;
  document.getElementById('instr-timing-h').textContent = L.instr_timing_h;
  document.getElementById('instr-total-label').textContent = L.timing_total_label;
  document.getElementById('instr-total-value').textContent = L.timing_total_value;
  document.getElementById('instr-rules-h').textContent = L.instr_rules_h;
  document.getElementById('instr-start-btn').textContent = L.instr_start_btn;

  const timingRows = [
    { icon: '💬', name: L.timing_anamnesis_name, desc: L.timing_anamnesis_desc, min: L.min5 },
    { icon: '🩺', name: L.timing_exam_name, desc: L.timing_exam_desc, min: L.min5 },
    { icon: '📋', name: L.timing_prelim_name, desc: L.timing_prelim_desc, min: L.min5 },
    { icon: '🧪', name: L.timing_labs_name, desc: L.timing_labs_desc, min: L.min5 },
    { icon: '✅', name: L.timing_final_name, desc: L.timing_final_desc, min: L.min10 },
  ];
  document.getElementById('instr-timing-rows').innerHTML = timingRows.map(r => `
    <div class="timing-row">
      <div class="timing-icon">${r.icon}</div>
      <div><div class="timing-name">${r.name}</div><div class="timing-desc">${r.desc}</div></div>
      <div class="timing-min">${r.min}</div>
    </div>
  `).join('');

  const rules = [L.rule1, L.rule2, L.rule3, L.rule4];
  document.getElementById('instr-rules-list').innerHTML = rules.map(r => `<div class="instr-rule"><b>—</b> ${r}</div>`).join('');

  // Results screen
  document.getElementById('res-grade-lbl').textContent = L.results_grade_lbl;
  document.getElementById('res-positive-title').textContent = L.positive_title;
  document.getElementById('res-negative-title').textContent = L.negative_title;
  document.getElementById('res-back-btn').textContent = L.back_to_cabinet;

  // Timeup overlay
  document.getElementById('timeup-title-text').textContent = L.timeup_title;
  document.getElementById('timeup-desc-text').textContent = L.timeup_desc;

  // Feedback modal
  document.getElementById('fb-modal-title-text').textContent = L.fb_modal_title;
  document.getElementById('fb-modal-desc-text').textContent = L.fb_modal_desc;
  document.getElementById('fb-text').placeholder = L.fb_placeholder;
  document.getElementById('fb-sent-msg').textContent = L.fb_sent;
  document.getElementById('fb-cancel-btn').textContent = L.fb_cancel;
  document.getElementById('fb-submit-btn').textContent = L.fb_send_btn;

  document.getElementById('exam-header-logo').textContent = L.instr_title;
  document.title = L.instr_title;
}

(function init() {
  const student = getStudentFromUrl();
  if (!student.student_id) { window.location.href = 'index.html'; return; }
  translateInstructionScreen();
  document.getElementById('instr-student-name').textContent = `${L.welcome_prefix} ${student.name}`;
  document.getElementById('exam-student-name').textContent = student.name;
  checkFeedbackAccess(student.phone);
})();
