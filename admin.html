<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Панель преподавателя — Симулятор пациента</title>
<style>
  :root{
    --blue:#1a5276; --blue-dark:#0d3d60; --blue-900:#083554;
    --green:#0f6e56; --green-2:#119474;
    --mint:#e8f6f1; --mint-2:#dff4ef;
    --bg:#f7f6f2; --white:#fff; --text:#13354d; --muted:#657789;
    --line:#d8e4ec; --line-soft:#edf3f6;
    --shadow:0 22px 70px rgba(26,82,118,.11);
    --shadow-soft:0 12px 34px rgba(26,82,118,.08);
    --danger:#a04444;
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--text); min-height:100vh;}
  button,input{font-family:inherit;}

  /* AUTH SCREEN */
  #screen-login{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-card{background:#fff; border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); max-width:400px; width:100%; padding:34px 30px;}
  .login-logo{font-size:30px; text-align:center; margin-bottom:6px;}
  .login-title{font-size:22px; font-weight:800; text-align:center; color:var(--blue-900); letter-spacing:-.02em;}
  .login-sub{font-size:13px; color:var(--muted); text-align:center; margin:6px 0 22px;}
  .tabs{display:grid; grid-template-columns:1fr 1fr; border:1px solid var(--line); border-radius:14px; background:#fff; overflow:hidden; margin-bottom:16px;}
  .tab-btn{appearance:none; border:0; background:transparent; color:var(--blue); font-weight:700; padding:12px; cursor:pointer; font-size:13.5px;}
  .tab-btn.active{background:var(--blue); color:#fff;}
  .field{display:flex; flex-direction:column; gap:5px; margin-bottom:12px;}
  .field label{font-size:12px; font-weight:700; color:var(--blue-900);}
  .field input{height:46px; border:1px solid var(--line); border-radius:11px; padding:0 14px; font-size:14px; outline:none;}
  .field input:focus{border-color:#86c9cf; box-shadow:0 0 0 3px rgba(37,198,207,.12);}
  .primary-btn{width:100%; border:0; border-radius:12px; height:48px; background:linear-gradient(135deg,var(--blue),#0d4166); color:#fff; font-weight:800; font-size:14.5px; cursor:pointer; margin-top:6px;}
  .primary-btn:disabled{opacity:.6; cursor:not-allowed;}
  .err-msg{color:var(--danger); font-size:12.5px; text-align:center; margin-top:10px; min-height:16px;}

  /* DASHBOARD */
  #screen-dash{display:none; min-height:100vh;}
  .dash-header{background:#fff; border-bottom:1px solid var(--line); padding:14px 20px; display:flex; align-items:center; justify-content:space-between;}
  .dash-header .brand{font-weight:800; color:var(--blue-900); font-size:15px;}
  .dash-header .who{font-size:12.5px; color:var(--muted);}
  .logout-btn{background:none; border:1px solid var(--line); border-radius:10px; padding:7px 14px; font-size:12.5px; font-weight:700; color:var(--muted); cursor:pointer;}
  .dash-body{max-width:960px; margin:0 auto; padding:24px 18px;}
  .dash-title{font-size:20px; font-weight:800; color:var(--blue-900); margin-bottom:4px;}
  .dash-stats-row{display:flex; gap:12px; margin:16px 0 22px; flex-wrap:wrap;}
  .dash-stat{flex:1; min-width:120px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px;}
  .dash-stat b{display:block; font-size:22px; color:var(--blue);}
  .dash-stat span{font-size:11.5px; color:var(--muted);}

  .student-row{display:flex; align-items:center; gap:14px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; cursor:pointer;}
  .student-row:hover{border-color:#b5d4f4;}
  .student-avatar{width:38px; height:38px; border-radius:50%; background:var(--mint); color:var(--green); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex-shrink:0;}
  .student-info{flex:1; min-width:0;}
  .student-name{font-weight:700; font-size:14px; color:var(--blue-900);}
  .student-meta{font-size:11.5px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .student-grade{font-weight:800; font-size:16px; padding:6px 12px; border-radius:10px; flex-shrink:0;}
  .student-grade.high{background:var(--mint-2); color:var(--green-2);}
  .student-grade.mid{background:#fff3df; color:#a06a1a;}
  .student-grade.low{background:#fdeaea; color:var(--danger);}
  .student-grade.none{background:var(--line-soft); color:var(--muted); font-size:12px;}
  .empty-msg{text-align:center; color:var(--muted); font-size:13px; padding:30px 10px;}

  /* STUDENT DETAIL / ATTEMPTS */
  #screen-student{display:none; min-height:100vh;}
  .back-btn{background:none; border:0; color:var(--blue); font-weight:700; font-size:13.5px; cursor:pointer; padding:6px 0; margin-bottom:14px;}
  .attempt-row{display:flex; justify-content:space-between; align-items:center; background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; cursor:pointer;}
  .attempt-row:hover{border-color:#b5d4f4;}
  .attempt-title{font-weight:700; font-size:13.5px; color:var(--blue-900);}
  .attempt-date{font-size:11.5px; color:var(--muted); margin-top:2px;}

  /* REVIEW (attempt detail) */
  #screen-attempt{display:none; min-height:100vh;}
  .review-card{max-width:720px; margin:0 auto; padding:24px 18px;}
  .results-grade{text-align:center; margin-bottom:18px;}
  .results-grade .num{font-size:38px; font-weight:800; color:var(--blue); line-height:1;}
  .results-grade .lbl{font-size:12px; color:var(--muted); margin-top:4px;}
  .block-grades-row{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:22px;}
  .block-grade-chip{flex:1; min-width:85px; text-align:center; background:#fff; border:1px solid var(--line); border-radius:10px; padding:8px 6px;}
  .block-grade-chip .bg-num{font-size:15px; font-weight:700; color:var(--blue);}
  .block-grade-chip .bg-lbl{font-size:9px; color:var(--muted); margin-top:2px;}
  .points-section{margin-bottom:18px;}
  .points-title{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; margin-bottom:10px;}
  .points-title.good{color:var(--green);}
  .points-title.bad{color:var(--danger);}
  .point-item{font-size:12.5px; line-height:1.5; padding:9px 12px; border-radius:10px; margin-bottom:7px;}
  .point-item.good{background:var(--mint-2); color:#0a4a3a;}
  .point-item.bad{background:#fdeaea; color:#7a2424;}
  .rv-detail-block{border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px; background:#fff;}
  .rv-detail-block h4{font-size:12px; font-weight:700; color:var(--blue-900); margin-bottom:8px;}
  .rv-empty{font-size:12px; color:var(--muted); font-style:italic;}
  .rv-chat-line{font-size:12.5px; line-height:1.6; margin-bottom:4px;}
  .rv-chat-line b{color:var(--blue);}
  .loading{text-align:center; padding:40px; color:var(--muted); font-size:13px;}

  .dash-nav{display:flex; gap:8px; background:#fff; border-bottom:1px solid var(--line); padding:0 20px;}
  .dash-nav-btn{background:none; border:0; border-bottom:2px solid transparent; padding:12px 6px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:6px;}
  .dash-nav-btn.active{color:var(--blue); border-bottom-color:var(--blue);}
  .fb-badge{background:var(--danger); color:#fff; font-size:10px; font-weight:800; border-radius:10px; padding:1px 6px;}
  .fb-item{background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px;}
  .fb-item.new{border-left:3px solid var(--blue);}
  .fb-item-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .fb-item-phone{font-weight:700; font-size:13px; color:var(--blue-900);}
  .fb-item-date{font-size:11px; color:var(--muted);}
  .fb-item-msg{font-size:13px; line-height:1.5; color:var(--text); margin-bottom:8px; white-space:pre-line;}
  .fb-item-page{font-size:10.5px; color:var(--muted); background:var(--line-soft); display:inline-block; padding:2px 8px; border-radius:6px; margin-bottom:8px;}
  .fb-resolve-btn{background:none; border:1px solid var(--line); border-radius:8px; padding:5px 12px; font-size:11.5px; font-weight:700; color:var(--green); cursor:pointer;}
  .fb-resolve-btn.done{color:var(--muted); border-color:var(--line);}


  .admin-lang-switch{position:fixed; top:14px; right:14px; z-index:500; display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; background:#fff; box-shadow:0 6px 16px rgba(26,82,118,.12);}
  .admin-lang-btn{background:transparent; border:none; padding:7px 12px; font-weight:800; color:var(--muted); font-size:11px; cursor:pointer;}
  .admin-lang-btn.active{background:var(--mint); color:var(--green);}

</style>
</head>
<body>

<div class="admin-lang-switch">
  <button class="admin-lang-btn active" id="alang-ru" onclick="setAdminLang('ru')">RU</button>
  <button class="admin-lang-btn" id="alang-en" onclick="setAdminLang('en')">EN</button>
</div>

<!-- LOGIN / REGISTER -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">👨‍🏫</div>
    <div class="login-title" id="at-login-title"></div>
    <div class="login-sub" id="at-login-sub"></div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchAdminTab('login')"></button>
      <button class="tab-btn" id="tab-register" onclick="switchAdminTab('register')"></button>
    </div>

    <form id="form-login">
      <div class="field"><label id="at-lbl-username1"></label><input type="text" id="li-username" autocomplete="username"></div>
      <div class="field"><label id="at-lbl-password1"></label><input type="password" id="li-password" autocomplete="current-password"></div>
      <button type="button" class="primary-btn" id="li-btn" onclick="adminLogin()"></button>
    </form>

    <form id="form-register" style="display:none;">
      <div class="field"><label id="at-lbl-fullname"></label><input type="text" id="re-fullname"></div>
      <div class="field"><label id="at-lbl-username2"></label><input type="text" id="re-username"></div>
      <div class="field"><label id="at-lbl-password2"></label><input type="password" id="re-password"></div>
      <button type="button" class="primary-btn" id="re-btn" onclick="adminRegister()"></button>
    </form>

    <div class="err-msg" id="auth-err"></div>
  </div>
</div>

<!-- DASHBOARD: student list -->
<div id="screen-dash">
  <div class="dash-header">
    <div><div class="brand" id="at-dash-brand"></div><div class="who" id="dash-who">—</div></div>
    <button class="logout-btn" onclick="adminLogout()" id="at-logout1"></button>
  </div>
  <div class="dash-nav">
    <button class="dash-nav-btn active" id="navtab-students" onclick="switchDashTab('students')"></button>
    <button class="dash-nav-btn" id="navtab-feedback" onclick="switchDashTab('feedback')"><span id="at-nav-fb-text"></span> <span class="fb-badge" id="fb-badge" style="display:none;"></span></button>
  </div>
  <div class="dash-body">
    <div id="dashtab-students">
      <div class="dash-title" id="at-students-title"></div>
      <div class="dash-stats-row" id="dash-stats"></div>
      <div id="students-list"><div class="loading js-loading-text"></div></div>
    </div>
    <div id="dashtab-feedback" style="display:none;">
      <div class="dash-title" id="at-feedback-title"></div>
      <div id="feedback-list"><div class="loading js-loading-text"></div></div>
    </div>
  </div>
</div>

<!-- STUDENT DETAIL: attempt list -->
<div id="screen-student">
  <div class="dash-header">
    <div><div class="brand" id="stud-name">—</div><div class="who" id="stud-meta">—</div></div>
    <button class="logout-btn" onclick="adminLogout()" id="at-logout2"></button>
  </div>
  <div class="dash-body">
    <button class="back-btn" onclick="backToDash()" id="at-back-students"></button>
    <div id="student-attempts-list"><div class="loading js-loading-text"></div></div>
  </div>
</div>

<!-- ATTEMPT DETAIL (review) -->
<div id="screen-attempt">
  <div class="dash-header">
    <div><div class="brand" id="at-review-title"></div></div>
    <button class="logout-btn" onclick="adminLogout()" id="at-logout3"></button>
  </div>
  <div class="review-card">
    <button class="back-btn" onclick="backToStudent()" id="at-back-attempts"></button>
    <div id="attempt-loading" class="loading js-loading-text"></div>
    <div id="attempt-content" style="display:none;">
      <h2 style="color:var(--blue-900); margin-bottom:2px;" id="at-title">—</h2>
      <div style="color:var(--muted); font-size:13px; margin-bottom:20px;" id="at-date">—</div>

      <div class="results-grade"><div class="num" id="at-grade">—</div><div class="lbl" id="at-grade-lbl"></div></div>
      <div class="block-grades-row" id="at-block-grades"></div>

      <div class="points-section">
        <div class="points-title good" id="at-positive-title"></div>
        <div id="at-positive"></div>
      </div>
      <div class="points-section">
        <div class="points-title bad" id="at-negative-title"></div>
        <div id="at-negative"></div>
      </div>

      <div style="margin-top:24px; padding-top:20px; border-top:1px solid var(--line);">
        <h3 style="font-size:14px; margin-bottom:14px; color:var(--blue-900);" id="at-details-title"></h3>
        <div id="at-details"></div>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND_URL = 'https://medical-simulator-api.onrender.com';
const SESSION_KEY = 'admin_session';
let currentAdmin = null;
let currentStudentId = null;
let currentStudentName = '';

const UI_T_DATA = {
ru: {
  login_title: 'Панель преподавателя', login_sub: 'Симулятор пациента',
  tab_login: 'Вход', tab_register: 'Регистрация',

  back_to_students: '← Back to all students', back_to_attempts: '← Back to student attempts',

  no_attempts: 'This student has no attempts yet', load_attempts_failed: 'Failed to load attempts',
  case_default: 'Case', load_attempt_failed: 'Failed to load attempt',
  no_positive: 'No points noted', no_negative: 'No mistakes noted',
  no_feedback: 'No feedback yet', load_feedback_failed: 'Failed to load feedback',
  mark_resolved: 'Mark as resolved', resolved: '✓ Resolved', no_phone: 'No number',
  block_labels: { anamnesis: 'History', exam: 'Examination', preliminary_diagnosis: 'Prelim. Dx', labs: 'Labs', final: 'Final' },
  chat_student: 'Student', chat_patient: 'Patient',
  empty_stage: 'Empty — stage not completed', nothing_ordered: 'Nothing ordered', not_specified: 'Not specified',
  sec: 'sec', diagnosis_lbl: 'Diagnosis:', treatment_lbl: 'Treatment:',
  detail_anamnesis: '💬 History', detail_exam: '🩺 Examination', detail_prelim: '📋 Preliminary Diagnosis',
  detail_labs: '🧪 Labs', detail_final: '✅ Diagnosis and Treatment',

  err_fill_fields: 'Please fill in username and password', err_logging_in: 'Logging in...', err_login_failed: 'Login failed',

};
let currentAdminLang = localStorage.getItem('preferred_lang') === 'en' ? 'en' : 'ru';
let UI_T = UI_T_DATA[currentAdminLang];

function setAdminLang(lang){
  currentAdminLang = lang;
  UI_T = UI_T_DATA[lang];
  localStorage.setItem('preferred_lang', lang);
  document.getElementById('alang-ru').classList.toggle('active', lang==='ru');
  document.getElementById('alang-en').classList.toggle('active', lang==='en');
  translateAdminPage();
}

function translateAdminPage(){
  document.getElementById('at-login-title').textContent = UI_T.login_title;
  document.getElementById('at-login-sub').textContent = UI_T.login_sub;
  document.getElementById('tab-login').textContent = UI_T.tab_login;
  document.getElementById('tab-register').textContent = UI_T.tab_register;
  document.getElementById('at-lbl-username1').textContent = UI_T.lbl_username;
  document.getElementById('at-lbl-password1').textContent = UI_T.lbl_password;
  document.getElementById('li-btn').textContent = UI_T.login_btn;
  document.getElementById('at-lbl-fullname').textContent = UI_T.lbl_fullname;
  document.getElementById('at-lbl-username2').textContent = UI_T.lbl_username;
  document.getElementById('at-lbl-password2').textContent = UI_T.lbl_password_min;
  document.getElementById('re-btn').textContent = UI_T.register_btn;
  document.getElementById('at-dash-brand').textContent = UI_T.dash_brand;
  document.getElementById('at-logout1').textContent = UI_T.logout_btn;
  document.getElementById('at-logout2').textContent = UI_T.logout_btn;
  document.getElementById('at-logout3').textContent = UI_T.logout_btn;
  document.getElementById('at-nav-fb-text').textContent = UI_T.nav_feedback;
  document.getElementById('navtab-students').textContent = UI_T.nav_students;
  document.getElementById('at-students-title').textContent = UI_T.students_title;
  document.getElementById('at-feedback-title').textContent = UI_T.feedback_title;
  document.getElementById('at-back-students').textContent = UI_T.back_to_students;
  document.getElementById('at-review-title').textContent = UI_T.review_title;
  document.getElementById('at-back-attempts').textContent = UI_T.back_to_attempts;
  document.getElementById('at-grade-lbl').textContent = UI_T.grade_lbl;
  document.getElementById('at-positive-title').textContent = UI_T.positive_title;
  document.getElementById('at-negative-title').textContent = UI_T.negative_title;
  document.getElementById('at-details-title').textContent = UI_T.details_title;
  document.querySelectorAll('.js-loading-text').forEach(el => el.textContent = UI_T.loading);
  document.title = UI_T.login_title + ' — ' + UI_T.login_sub;
}
function switchAdminTab(tab){
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('form-login').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('auth-err').textContent = '';
}

function saveAdminSession(admin){
  localStorage.setItem(SESSION_KEY, JSON.stringify(admin));
}
function getAdminSession(){
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e){ return null; }
}
function clearAdminSession(){ localStorage.removeItem(SESSION_KEY); }

async function adminLogin(){
  const username = document.getElementById('li-username').value.trim();
  const password = document.getElementById('li-password').value;
  const btn = document.getElementById('li-btn');
  const err = document.getElementById('auth-err');
  err.textContent = '';
  if(!username || !password){ err.textContent = UI_T.err_fill_fields; return; }
  btn.disabled = true; btn.textContent = UI_T.err_logging_in;
  try{
    const res = await fetch(`${BACKEND_URL}/api/admin-login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if(!res.ok){ const d = await res.json(); throw new Error(d.detail || UI_T.err_login_failed); }
    const admin = await res.json();
    saveAdminSession(admin);
    enterDashboard(admin);
  }catch(e){
    err.textContent = e.message || UI_T.err_login_generic;
  }
  btn.disabled = false; btn.textContent = UI_T.login_btn;
}

async function adminRegister(){
  const full_name = document.getElementById('re-fullname').value.trim();
  const username = document.getElementById('re-username').value.trim();
  const password = document.getElementById('re-password').value;
  const btn = document.getElementById('re-btn');
  const err = document.getElementById('auth-err');
  err.textContent = '';
  if(!username || password.length < 6){ err.textContent = UI_T.err_reg_fields; return; }
  btn.disabled = true; btn.textContent = UI_T.err_creating;
  try{
    const res = await fetch(`${BACKEND_URL}/api/admin-register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password, full_name, org_slug:'tashkent-endo'})
    });
    if(!res.ok){ const d = await res.json(); throw new Error(d.detail || UI_T.err_reg_failed); }
    const admin = await res.json();
    saveAdminSession(admin);
    enterDashboard(admin);
  }catch(e){
    err.textContent = e.message || UI_T.err_reg_generic;
  }
  btn.disabled = false; btn.textContent = UI_T.register_btn;
}

function adminLogout(){
  clearAdminSession();
  document.getElementById('screen-dash').style.display = 'none';
  document.getElementById('screen-student').style.display = 'none';
  document.getElementById('screen-attempt').style.display = 'none';
  document.getElementById('screen-login').style.display = 'flex';
}

function gradeClass(g){
  if(g === null || g === undefined) return 'none';
  if(g >= 75) return 'high';
  if(g >= 50) return 'mid';
  return 'low';
}


// ── DASHBOARD TABS ────────────────────────────────────
function switchDashTab(tab){
  document.getElementById('navtab-students').classList.toggle('active', tab==='students');
  document.getElementById('navtab-feedback').classList.toggle('active', tab==='feedback');
  document.getElementById('dashtab-students').style.display = tab==='students' ? 'block' : 'none';
  document.getElementById('dashtab-feedback').style.display = tab==='feedback' ? 'block' : 'none';
  if(tab==='feedback') loadFeedback();
}

async function loadFeedback(){
  const listEl = document.getElementById('feedback-list');
  listEl.innerHTML = `<div class="loading">${UI_T.loading}</div>`;
  try{
    const res = await fetch(`${BACKEND_URL}/api/feedback`);
    const items = await res.json();

    const newCount = items.filter(i => i.status !== 'resolved').length;
    const badge = document.getElementById('fb-badge');
    if(newCount > 0){ badge.style.display='inline-block'; badge.textContent = newCount; } else { badge.style.display='none'; }

    if(!items.length){
      listEl.innerHTML = `<div class="empty-msg">${UI_T.no_feedback}</div>`;
      return;
    }
    listEl.innerHTML = items.map(i => `
      <div class="fb-item ${i.status !== 'resolved' ? 'new' : ''}">
        <div class="fb-item-head">
          <span class="fb-item-phone">${i.phone || UI_T.no_phone}</span>
          <span class="fb-item-date">${new Date(i.created_at).toLocaleString(UI_T.date_locale)}</span>
        </div>
        ${i.page ? `<span class="fb-item-page">${i.page}</span>` : ''}
        <div class="fb-item-msg">${i.message}</div>
        <button class="fb-resolve-btn ${i.status==='resolved' ? 'done' : ''}" onclick="toggleFeedbackStatus('${i.id}','${i.status==='resolved'?'new':'resolved'}')">${i.status==='resolved' ? UI_T.resolved : UI_T.mark_resolved}</button>
      </div>
    `).join('');
  }catch(e){
    listEl.innerHTML = `<div class="empty-msg">${UI_T.load_feedback_failed}</div>`;
  }
}

async function toggleFeedbackStatus(id, newStatus){
  try{
    await fetch(`${BACKEND_URL}/api/feedback/${id}/status`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({status:newStatus})
    });
    loadFeedback();
  }catch(e){}
}

async function enterDashboard(admin){
  currentAdmin = admin;
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'block';
  document.getElementById('dash-who').textContent = admin.full_name || admin.username;
  fetch(`${BACKEND_URL}/api/feedback`).then(r=>r.json()).then(items=>{
    const n = items.filter(i=>i.status!=='resolved').length;
    const badge = document.getElementById('fb-badge');
    if(n>0){ badge.style.display='inline-block'; badge.textContent=n; }
  }).catch(()=>{});

  const listEl = document.getElementById('students-list');
  listEl.innerHTML = `<div class="loading">${UI_T.loading}</div>`;
  try{
    const res = await fetch(`${BACKEND_URL}/api/admin/students?organization_id=${admin.organization_id}`);
    const students = await res.json();

    const totalCases = students.reduce((s,x)=>s+x.cases_completed,0);
    const gradedStudents = students.filter(x=>x.average_grade !== null);
    const avgAll = gradedStudents.length ? Math.round(gradedStudents.reduce((s,x)=>s+x.average_grade,0)/gradedStudents.length) : null;

    document.getElementById('dash-stats').innerHTML = `
      <div class="dash-stat"><b>${students.length}</b><span>${UI_T.stat_students}</span></div>
      <div class="dash-stat"><b>${totalCases}</b><span>${UI_T.stat_cases}</span></div>
      <div class="dash-stat"><b>${avgAll !== null ? avgAll+'%' : '—'}</b><span>${UI_T.stat_avg}</span></div>
    `;

    if(!students.length){
      listEl.innerHTML = `<div class="empty-msg">${UI_T.no_students}</div>`;
      return;
    }
    listEl.innerHTML = students.map(s => `
      <div class="student-row" onclick="openStudent('${s.id}','${(s.name||UI_T.no_name).replace(/'/g,"\\\\'")}')">
        <div class="student-avatar">${(s.name||'?').trim().charAt(0).toUpperCase() || '?'}</div>
        <div class="student-info">
          <div class="student-name">${s.name || UI_T.no_name}</div>
          <div class="student-meta">${s.workplace || s.phone || ''}</div>
        </div>
        <div class="student-grade ${gradeClass(s.average_grade)}">${s.average_grade !== null ? s.average_grade+'%' : '—'} · ${s.cases_completed}</div>
      </div>
    `).join('');
  }catch(e){
    listEl.innerHTML = `<div class="empty-msg">${UI_T.load_students_failed}</div>`;
  }
}

async function openStudent(studentId, name){
  currentStudentId = studentId;
  currentStudentName = name;
  document.getElementById('screen-dash').style.display = 'none';
  document.getElementById('screen-student').style.display = 'block';
  document.getElementById('stud-name').textContent = name;
  document.getElementById('stud-meta').textContent = UI_T.history_label;

  const listEl = document.getElementById('student-attempts-list');
  listEl.innerHTML = `<div class="loading">${UI_T.loading}</div>`;
  try{
    const res = await fetch(`${BACKEND_URL}/api/admin/student-attempts?student_id=${studentId}`);
    const attempts = await res.json();
    if(!attempts.length){
      listEl.innerHTML = `<div class="empty-msg">${UI_T.no_attempts}</div>`;
      return;
    }
    listEl.innerHTML = attempts.map(a => `
      <div class="attempt-row" onclick="openAttempt('${a.id}')">
        <div>
          <div class="attempt-title">${a.case_title || UI_T.case_default}</div>
          <div class="attempt-date">${new Date(a.finished_at).toLocaleDateString(UI_T.date_locale)}</div>
        </div>
        <div class="student-grade ${gradeClass(a.grade)}">${a.grade !== null && a.grade !== undefined ? a.grade+'%' : '—'}</div>
      </div>
    `).join('');
  }catch(e){
    listEl.innerHTML = `<div class="empty-msg">${UI_T.load_attempts_failed}</div>`;
  }
}

function backToDash(){
  document.getElementById('screen-student').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'block';
}
function backToStudent(){
  document.getElementById('screen-attempt').style.display = 'none';
  document.getElementById('screen-student').style.display = 'block';
}

async function openAttempt(attemptId){
  document.getElementById('screen-student').style.display = 'none';
  document.getElementById('screen-attempt').style.display = 'block';
  document.getElementById('attempt-loading').style.display = 'block';
  document.getElementById('attempt-content').style.display = 'none';

  try{
    const res = await fetch(`${BACKEND_URL}/api/attempt-detail?attempt_id=${attemptId}`);
    const a = await res.json();
    renderAttempt(a);
  }catch(e){
    document.getElementById('attempt-loading').textContent = UI_T.load_attempt_failed;
  }
}

function renderAttempt(a){
  document.getElementById('attempt-loading').style.display = 'none';
  document.getElementById('attempt-content').style.display = 'block';

  document.getElementById('at-title').textContent = a.case_title || UI_T.case_default;
  document.getElementById('at-date').textContent = new Date(a.finished_at).toLocaleDateString(UI_T.date_locale);

  const ev = a.evaluation || {};
  document.getElementById('at-grade').textContent = (ev.overall_grade !== null && ev.overall_grade !== undefined) ? ev.overall_grade+'%' : (a.grade !== null && a.grade !== undefined ? a.grade+'%' : '—');

  const blockLabels = UI_T.block_labels;
  const bg = ev.block_grades || {};
  document.getElementById('at-block-grades').innerHTML = Object.keys(blockLabels).map(k => `
    <div class="block-grade-chip"><div class="bg-num">${bg[k] !== undefined ? bg[k]+'%' : '—'}</div><div class="bg-lbl">${blockLabels[k]}</div></div>
  `).join('');

  document.getElementById('at-positive').innerHTML = (ev.positive_points||[]).length
    ? ev.positive_points.map(p=>`<div class="point-item good">✅ ${p}</div>`).join('')
    : `<div class="point-item good">${UI_T.no_positive}</div>`;
  document.getElementById('at-negative').innerHTML = (ev.negative_points||[]).length
    ? ev.negative_points.map(p=>`<div class="point-item bad">⚠️ ${p}</div>`).join('')
    : `<div class="point-item bad">${UI_T.no_negative}</div>`;

  const blocks = a.blocks || {};
  const anamnesis = blocks.anamnesis || {};
  const exam = blocks.exam || {};
  const prelim = blocks.preliminary_diagnosis || {};
  const labs = blocks.labs || {};
  const final = blocks.final || {};

  const chatHtml = (t) => (!t || !t.length) ? `<div class="rv-empty">${UI_T.empty_stage}</div>` : t.map(m=>`<div class="rv-chat-line"><b>${m.role==='student'?UI_T.chat_student:UI_T.chat_patient}:</b> ${m.text}</div>`).join('');
  const listHtml = (items) => (!items || !items.length) ? `<div class="rv-empty">${UI_T.nothing_ordered}</div>` : items.map(i=>`<div class="rv-chat-line">• ${i}</div>`).join('');

  document.getElementById('at-details').innerHTML = `
    <div class="rv-detail-block"><h4>${UI_T.detail_anamnesis} (${anamnesis.duration_seconds||0} ${UI_T.sec})</h4>${chatHtml(anamnesis.transcript)}</div>
    <div class="rv-detail-block"><h4>${UI_T.detail_exam} (${exam.duration_seconds||0} ${UI_T.sec})</h4>${listHtml(exam.ordered)}</div>
    <div class="rv-detail-block"><h4>${UI_T.detail_prelim} (${prelim.duration_seconds||0} ${UI_T.sec})</h4>${prelim.text ? `<div class="rv-chat-line">${prelim.text}</div>` : `<div class="rv-empty">${UI_T.not_specified}</div>`}</div>
    <div class="rv-detail-block"><h4>${UI_T.detail_labs} (${labs.duration_seconds||0} ${UI_T.sec})</h4>${listHtml(labs.ordered)}</div>
    <div class="rv-detail-block"><h4>${UI_T.detail_final} (${final.duration_seconds||0} ${UI_T.sec})</h4>
      <div class="rv-chat-line"><b>${UI_T.diagnosis_lbl}</b> ${final.diagnosis || `(${UI_T.not_specified})`}</div>
      <div class="rv-chat-line"><b>${UI_T.treatment_lbl}</b> ${final.treatment_plan || `(${UI_T.not_specified})`}</div>
    </div>
  `;
}

// ── INIT ──────────────────────────────────────────────
(function init(){
  document.getElementById('alang-ru').classList.toggle('active', currentAdminLang === 'ru');
  document.getElementById('alang-en').classList.toggle('active', currentAdminLang === 'en');
  translateAdminPage();
  const saved = getAdminSession();
  if(saved && saved.admin_id){
    enterDashboard(saved);
  }
  document.addEventListener('keydown', e => {
    if(e.key !== 'Enter') return;
    if(document.getElementById('screen-login').style.display !== 'none'){
      const loginActive = document.getElementById('form-login').style.display !== 'none';
      loginActive ? adminLogin() : adminRegister();
    }
  });
})();
</script>
